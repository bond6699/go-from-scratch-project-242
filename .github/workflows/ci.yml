# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Этот джоб отвечает за линтинг
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
            go-version: '1.26.3'

      - name: Initialize go module if not exists
        run: |
          if [ ! -f go.mod ]; then
            go mod init github.com/$(echo $GITHUB_REPOSITORY)
          fi
          go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
            version: v2.9.0
        env:
            GO111MODULE: on